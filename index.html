<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Jimakos</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
position:relative;
}

/* Beach Background */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(
rgba(0,0,0,.35),
rgba(0,0,0,.55)
),
url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1920&q=80');

background-size:cover;
background-position:center;
animation:zoomBeach 20s infinite alternate ease-in-out;
z-index:-2;
}


/* Floating Particles */

.particle{
position:absolute;
background:#4fc3ff;
border-radius:50%;
opacity:.5;
animation:float linear infinite;
z-index:-1;
}


.container{
width:100%;
max-width:420px;
text-align:center;
}

.card{
background:rgba(0,0,0,.45);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.15);
border-radius:30px;
padding:35px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,.4);
}

.avatar{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
border:4px solid rgb(155, 79, 255);
box-shadow:0 0 30px rgba(155, 79, 255, 0.5);
}

h1{
margin-top:15px;
color:white;
font-size:2rem;
}

.bio{
margin-top:10px;
color:#ddd;
margin-bottom:25px;
}

.links{
display:flex;
flex-direction:column;
gap:15px;
}

.link{
display:block;
padding:16px;
border-radius:18px;
text-decoration:none;
color:white;
font-weight:600;
background:rgba(255,255,255,.08);
border:1px solid rgb(155, 79, 255);
transition:.3s;
}

.link:hover{
background:rgba(146, 79, 255, 0.3);
box-shadow:0 0 20px rgba(155, 79, 255, 0.6);
}

.footer{
margin-top:20px;
color:#bbb;
font-size:13px;
}
</style>
</head>

<body>

<div class="bg"></div>

<script>
for(let i=0;i<40;i++){
let p=document.createElement("div");
p.classList.add("particle");

let size=Math.random()*6+2;



document.body.appendChild(p);
}
</script>

src="https://cdn.discordapp.com/avatars/815705700729880628/1c23fd24043e0f36d1a014a520860015.webp?size=1024">
