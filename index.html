<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Jimakos</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at top,#8b0000 0%,#250000 25%,#000 70%);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    color:white;
}

.container{
    width:100%;
    max-width:450px;
    text-align:center;
}

.profile{
    margin-bottom:30px;
}

.profile img{
    width:130px;
    height:130px;
    border-radius:50%;
    border:4px solid #ff0000;
    box-shadow:0 0 25px rgba(255,0,0,.6);
    object-fit:cover;
}

.profile h1{
    margin-top:15px;
    font-size:2rem;
    font-weight:700;
}

.profile p{
    color:#cfcfcf;
    margin-top:8px;
}

.links{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.link{
    text-decoration:none;
    color:white;
    padding:18px;
    border-radius:18px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,0,0,.4);
    backdrop-filter:blur(10px);
    transition:0.3s;
    font-weight:600;
}

.link:hover{
    transform:translateY(-4px);
    background:#c40000;
    box-shadow:0 0 20px rgba(255,0,0,.6);
}

.footer{
    margin-top:30px;
    color:#888;
    font-size:14px;
}
</style>
</head>
<body>

<div class="container">

    <div class="profile">
        <img src="https://cdn.discordapp.com/avatars/815705700729880628/1c23fd24043e0f36d1a014a520860015.webp?size=1024">
        <h1>𝐑𝐞𝐚𝐥 𝐉𝐢𝐦𝐚𝐤𝐨𝐬</h1>
        <p>Gaming • Community • Discord</p>
    </div>

    <div class="links">

        <a class="link"
        href="https://www.youtube.com/@ChillzoneTeam-i9i"
        target="_blank">
        🎥 YouTube
        </a>

        <a class="link"
        href="https://discord.gg/5nZRf2hqVD"
        target="_blank">
        💬 Discord Server #1
        </a>

        <a class="link"
        href="https://discord.gg/5DsdMGxu3W"
        target="_blank">
        🔥 Discord Server #2
        </a>

        <a class="link"
        href="https://discord.gg/CuUeEmHBkx"
        target="_blank">
        🚀 Discord Server #3
        </a>

    </div>

    <div class="footer">
        © Real Jimakos
    </div>

</div>

</body>
</html>
